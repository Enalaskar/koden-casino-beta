<!-- Session stats patch + history dots -->
<script>
(function() {
    var rBets=0, rWins=0, rGreen=0;
    var histDots = [];

    // Patch placeBet to track session bets
    var origPlaceBet = window.placeBet;
    window.placeBet = function(color) {
        rBets++;
        document.getElementById("r-stat-bets").textContent = rBets;
        if (origPlaceBet) origPlaceBet(color);
    };

    // Watch winners-list for result clues
    var wc = document.getElementById("winners-container");
    if (wc) {
        var obs = new MutationObserver(function(muts) {
            muts.forEach(function(m) {
                m.addedNodes.forEach(function(node) {
                    if (!node.textContent) return;
                    var txt = node.textContent.toLowerCase();
                    var color = "bg-[#333]";
                    if (txt.includes("rouge") || txt.includes("red"))  { color="bg-[#cc1e1e]"; rWins++; }
                    else if (txt.includes("vert") || txt.includes("green")) { color="bg-[#22c55e]"; rWins++; rGreen++; document.getElementById("r-stat-green").textContent=rGreen; }
                    else if (txt.includes("noir") || txt.includes("black")) { color="bg-[#222]"; rWins++; }
                    document.getElementById("r-stat-wins").textContent = rWins;
                    // Add dot
                    histDots.unshift(color);
                    if (histDots.length > 15) histDots.pop();
                    var container = document.getElementById("roul-history-dots");
                    if (container) {
                        container.innerHTML = histDots.map(function(c) {
                            return "<div class=\"hist-dot " + c + "\"></div>";
                        }).join("");
                    }
                });
            });
        });
        obs.observe(wc, { childList: true });
    }
})();
</script>

    <!-- ========= LOADER SCRIPT ========= -->
    <script>
    (function() {
        var loader  = document.getElementById("koden-loader");
        var statusEl = document.getElementById("loader-status-text");

        var steps = [
            { t: 200,  msg: "Connexion Firebase..." },
            { t: 600,  msg: "Chargement des donnees..." },
            { t: 1100, msg: "Synchronisation session..." },
            { t: 1500, msg: "Pret !" },
        ];

        steps.forEach(function(s) {
            setTimeout(function() {
                if (statusEl) statusEl.textContent = s.msg;
            }, s.t);
        });

        function dismiss() {
            if (!loader) return;
            loader.classList.add("fade-out");
            setTimeout(function() {
                if (loader && loader.parentNode) loader.parentNode.removeChild(loader);
            }, 550);
        }

        // Dismiss after 1.8s minimum, or when page fully loaded
        var minTime = 1800;
        var start   = Date.now();

        function tryDismiss() {
            var elapsed = Date.now() - start;
            var wait    = Math.max(0, minTime - elapsed);
            setTimeout(dismiss, wait);
        }

        if (document.readyState === "complete") {
            tryDismiss();
        } else {
            window.addEventListener("load", tryDismiss);
            // Hard fallback at 3s
            setTimeout(dismiss, 3000);
        }
    })();
    </script>
