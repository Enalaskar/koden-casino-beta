.tower-tile{
  aspect-ratio:1;border-radius:12px;

<script>
// ===== TOWER GAME LOGIC =====

// difficulty config: {cols, bombs, multPerFloor}
const DIFF = {
  easy:   { cols:4, bombs:1, mult:1.35, desc:'4 cases, 1 bombe par etage' },
  normal: { cols:3, bombs:1, mult:1.50, desc:'3 cases, 1 bombe par etage' },
  hard:   { cols:2, bombs:1, mult:1.90, desc:'2 cases, 1 bombe par etage' },
};

const TOTAL_FLOORS = 10;

let currentDiff  = 'normal';
let towerActive  = false;
let currentFloor = 0;
let towerMult    = 1.0;
let towerBet     = 0;
let floorLayouts = []; // per floor: which col index is bomb
let twGames=0, twCashouts=0, twMaxFloor=0;

function setDiff(d) {
  currentDiff = d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.style.opacity='0.5');
  document.querySelector(`.diff-btn:nth-child(${['easy','normal','hard'].indexOf(d)+1})`).style.opacity='1';
  document.getElementById('diff-desc').textContent = DIFF[d].desc;
}
setDiff('normal');

function buildTower() {
  const grid = document.getElementById('tower-grid');
  grid.innerHTML = '';
  floorLayouts = [];
  const cfg = DIFF[currentDiff];

  for (let floor=0; floor < TOTAL_FLOORS; floor++) {
    // Pick bomb position(s)
    const bombIdx = Math.floor(Math.random() * cfg.cols);
    floorLayouts.push(bombIdx);

    const row = document.createElement('div');
    row.className = 'flex gap-2 justify-center w-full';
    row.id = `floor-${floor}`;

    // Floor label
    const label = document.createElement('div');
    label.className = 'flex items-center justify-center w-8 shrink-0';
    const mult = Math.pow(cfg.mult, floor+1);
    label.innerHTML = `<span class="text-[9px] font-black text-zinc-700" id="floor-label-${floor}">x${mult.toFixed(2)}</span>`;

    for (let col=0; col < cfg.cols; col++) {
      const tile = document.createElement('div');
      tile.className = 'tower-tile flex-1 disabled';
      tile.innerHTML = '&#x1F7E5;'; // placeholder square
      tile.style.fontSize='0.9rem';
      tile.id = `tile-${floor}-${col}`;
      tile.onclick = () => tileClick(floor, col);
      row.appendChild(tile);
    }

    const wrapper = document.createElement('div');
    wrapper.className = 'flex items-center gap-2';
    wrapper.appendChild(label);
    wrapper.appendChild(row);

    grid.appendChild(wrapper);
  }
}

function activateFloor(floor) {
  // Disable previous floor tiles
  if (floor > 0) {
    const cfg = DIFF[currentDiff];
    for(let c=0; c<cfg.cols; c++) {
      const t = document.getElementById(`tile-${floor-1}-${c}`);
      if(t) { t.classList.remove('current-row','floor-active'); t.classList.add('disabled'); }
    }
    const prevRow = document.getElementById(`floor-${floor-1}`);
    if(prevRow) prevRow.classList.remove('floor-active');
  }

  const cfg = DIFF[currentDiff];
  for(let c=0; c<cfg.cols; c++) {
    const t = document.getElementById(`tile-${floor}-${c}`);
    if(t) {
      t.classList.remove('disabled');
      t.classList.add('current-row');
      t.innerHTML = '&#x1F537;'; // clickable indicator
    }
  }
  const row = document.getElementById(`floor-${floor}`);
  if(row) row.classList.add('floor-active');

  // Scroll into view on small screens
  row?.scrollIntoView({behavior:'smooth',block:'center'});
}

async function tileClick(floor, col) {
  if (!towerActive || floor !== currentFloor) return;
  const isBomb = col === floorLayouts[floor];
  const tile = document.getElementById(`tile-${floor}-${col}`);

  // Reveal all tiles in this floor
  const cfg = DIFF[currentDiff];
  for(let c=0; c<cfg.cols; c++) {
    const t = document.getElementById(`tile-${floor}-${c}`);
    if(!t) continue;
    t.classList.add('revealed');
    t.classList.remove('current-row','floor-active');
    if(c === floorLayouts[floor]) {
      t.innerHTML = '&#x1F4A3;'; // bomb
      t.classList.add('bomb');
    } else {
      t.innerHTML = '&#x2B50;'; // star = safe
      t.classList.add('safe');
    }
  }

  if (isBomb) {
    // Game over
    towerActive = false;
    document.getElementById('tower-live').classList.add('hidden');
    document.getElementById('tower-cashout-btn').classList.add('hidden');
    document.getElementById('tower-start-btn').classList.remove('hidden');
    document.getElementById('tower-result').innerHTML = `<p class="font-black italic uppercase tracking-tighter text-xl text-[#ef4444]">&#x1F4A5; Bombe ! -${towerBet} coins</p>`;
    if(typeof updateGlobalStats==="function") updateGlobalStats(-towerBet, false, true);
    if(typeof addToLogs==="function") addToLogs(`BOMB: etage ${floor+1} — -${towerBet} coins`,'#ef4444');
    if(twMaxFloor < floor) { twMaxFloor=floor; document.getElementById('tw-maxfloor').textContent=floor; }
  } else {
    // Safe — go up
    currentFloor++;
    towerMult *= cfg.mult;
    const potential = Math.floor(towerBet * towerMult);

    const multEl = document.getElementById('tw-mult');
    multEl.textContent = 'x'+towerMult.toFixed(2);
    multEl.classList.remove('mult-up');
    void multEl.offsetWidth;
    multEl.classList.add('mult-up');

    document.getElementById('tw-floor').textContent = `${currentFloor} / ${TOTAL_FLOORS}`;
    document.getElementById('tw-potential').textContent = potential + ' coins';
    document.getElementById('tower-cashout-btn').textContent = `Encaisser ${potential} coins`;

    const floorLabel = document.getElementById(`floor-label-${floor}`);
    if(floorLabel) { floorLabel.style.color='#22c55e'; floorLabel.style.fontWeight='900'; }

    if(typeof addToLogs==="function") addToLogs(`SAFE: etage ${floor+1} — x${towerMult.toFixed(2)}`,'#22c55e');

    if (currentFloor >= TOTAL_FLOORS) {
      // Won all floors!
      await cashoutTower(true);
    } else {
      activateFloor(currentFloor);
    }
  }
}

async function startTower() {
  const userId = localStorage.getItem('active_session');
  if (!userId) return;
  const bet = parseInt(document.getElementById('tower-bet').value);
  if (isNaN(bet)||bet<1) return;
  if (bet > balance) { if(typeof showNotification==="function")showNotification("Solde insuffisant !","error"); return; }

  // Deduct
  try {
    await window.fs.updateDoc(window.fs.doc(window.db_online,"users",userId),{balance:window.fs.increment(-bet)});
  } catch(e){}
  balance -= bet;
  if(typeof updateBalanceDisplay==="function") updateBalanceDisplay(balance);
  if(typeof updateGlobalStats==="function") updateGlobalStats(-bet,false,false);

  towerBet = bet;
  towerMult = 1.0;
  currentFloor = 0;
  towerActive = true;
  twGames++;
  document.getElementById('tw-games').textContent = twGames;

  buildTower();
  activateFloor(0);

  document.getElementById('tower-live').classList.remove('hidden');
  document.getElementById('tw-floor').textContent = '0 / '+TOTAL_FLOORS;
  document.getElementById('tw-mult').textContent = 'x1.00';
  document.getElementById('tw-potential').textContent = bet+' coins';
  document.getElementById('tower-start-btn').classList.add('hidden');
  document.getElementById('tower-cashout-btn').classList.remove('hidden');
  document.getElementById('tower-cashout-btn').textContent = 'Encaisser '+bet+' coins';
  document.getElementById('tower-result').innerHTML = `<p class="text-[10px] font-black text-[#8b5cf6] uppercase tracking-widest">Choisissez une case pour grimper !</p>`;
  if(typeof addToLogs==="function") addToLogs(`START: mise ${bet} coins — ${currentDiff}`,'#8b5cf6');
}

async function cashoutTower(perfect=false) {
  if (!towerActive) return;
  towerActive = false;
  const userId = localStorage.getItem('active_session');
  const win = Math.floor(towerBet * towerMult);
  const profit = win - towerBet;

  try {
    await window.fs.updateDoc(window.fs.doc(window.db_online,"users",userId),{balance:window.fs.increment(win)});
  } catch(e){}
  balance += win;
  if(typeof updateBalanceDisplay==="function") updateBalanceDisplay(balance);
  if(typeof updateGlobalStats==="function") updateGlobalStats(profit, true, true);

  twCashouts++;
  if(currentFloor > twMaxFloor) { twMaxFloor=currentFloor; document.getElementById('tw-maxfloor').textContent=currentFloor; }
  document.getElementById('tw-cashouts').textContent = twCashouts;

  const msg = perfect ? '&#x1F3C6; Tour complete !' : '&#x1F4B0; Encaisse !';
  document.getElementById('tower-result').innerHTML = `<div class="text-center"><p class="font-black italic uppercase tracking-tighter text-xl text-[#22c55e]">${msg} +${win} coins</p><p class="text-zinc-600 text-xs mt-1">x${towerMult.toFixed(2)} — etage ${currentFloor}</p></div>`;
  document.getElementById('tower-cashout-btn').classList.add('hidden');
  document.getElementById('tower-start-btn').classList.remove('hidden');
  document.getElementById('tower-live').classList.add('hidden');

  if(typeof addToLogs==="function") addToLogs(`CASHOUT: +${win} coins (x${towerMult.toFixed(2)})`,'#fbbf24');
  if(win>=50 && typeof window.publishWinToChat==="function") window.publishWinToChat("Tower", win, towerMult);
  if(typeof showNotification==="function") showNotification(`Encaisse ! +${win} coins (x${towerMult.toFixed(2)})`,"success");
}
