<script>

// ===== HISTORIQUE =====

let historyData = [];
let chartInstance = null;

function loadHistory() {
  const raw = localStorage.getItem('koden_history_'+localStorage.getItem('active_session'));
  historyData = raw ? JSON.parse(raw) : [];
}

function saveHistory() {
  const key = 'koden_history_'+localStorage.getItem('active_session');
  // Keep last 500 entries
  if (historyData.length > 500) historyData = historyData.slice(-500);
  localStorage.setItem(key, JSON.stringify(historyData));
}

// Expose so game pages can call it
window.recordGame = function(game, bet, profit) {
  loadHistory();
  historyData.push({ game, bet, profit, ts: Date.now() });
  saveHistory();
};

function renderStats() {
  // Use Firebase global stats for the top cards (most accurate)
  const globalStats = (typeof stats !== 'undefined') ? stats : {};
  const rounds  = Number(globalStats.rounds)      || historyData.length;
  const wins    = Number(globalStats.wins)        || historyData.filter(h=>h.profit>0).length;
  const profit  = Number(globalStats.totalProfit) || historyData.reduce((a,h)=>a+h.profit,0);
  // Best win from local history
  const best    = historyData.length ? Math.max(0, ...historyData.map(h=>h.profit)) : 0;

  document.getElementById('h-rounds').textContent  = rounds;
  document.getElementById('h-winrate').textContent = rounds > 0 ? (wins/rounds*100).toFixed(1)+'%' : '0%';
  const pEl = document.getElementById('h-profit');
  pEl.textContent = (profit >= 0 ? '+' : '') + Math.round(profit);
  pEl.style.color = profit >= 0 ? '#22c55e' : '#ef4444';
  document.getElementById('h-best').textContent = Math.round(best);
}

function renderChart(filter='all') {
  const now = Date.now();
  let data = historyData;
  if (filter==='week') data = data.filter(h=>now-h.ts<7*86400000);
  if (filter==='day')  data = data.filter(h=>now-h.ts<86400000);

  // Cumulative profit line
  let cum=0;
  const points = data.map(h=>{ cum+=h.profit; return cum; });
  const labels = data.map((_,i)=>i+1);

  const canvas = document.getElementById('history-chart');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(canvas, {
    type:'line',
    data:{
      labels,
      datasets:[{
        data: points,
        borderColor: points[points.length-1]>=0?'#22c55e':'#ef4444',
        backgroundColor: points[points.length-1]>=0?'rgba(34,197,94,0.08)':'rgba(239,68,68,0.08)',
        borderWidth: 2, fill: true, tension: 0.4, pointRadius: 0,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{display:false},
        y:{
          grid:{color:'rgba(255,255,255,0.04)'},
          ticks:{color:'#6b7280',font:{size:9},callback:v=>(v>=0?'+':'')+v.toFixed(0)}
        }
      }
    }
  });
}

function setChartFilter(f) {
  document.querySelectorAll('.chart-filter').forEach(b=>{
    b.style.borderColor='#1f1f21'; b.style.color='#6b7280';
  });
  document.getElementById('f-'+f).style.borderColor='#8b5cf6';
  document.getElementById('f-'+f).style.color='#8b5cf6';
  renderChart(f);
}

function renderTable() {
  const gameF   = document.getElementById('filter-game').value;
  const resultF = document.getElementById('filter-result').value;
  let data = [...historyData].reverse();
  if (gameF)   data = data.filter(h=>h.game===gameF);
  if (resultF==='win')  data = data.filter(h=>h.profit>0);
  if (resultF==='lose') data = data.filter(h=>h.profit<=0);

  const tbody = document.getElementById('history-table');
  const noH   = document.getElementById('no-history');
  if (!data.length) { tbody.innerHTML=''; noH.classList.remove('hidden'); return; }
  noH.classList.add('hidden');

  tbody.innerHTML = data.slice(0,100).map(h=>{
    const color = h.profit>0?'#22c55e':h.profit<0?'#ef4444':'#6b7280';
    const d = new Date(h.ts);
    return `<tr class="border-b border-[#1f1f21]/60 hover:bg-white/[0.02] transition-colors">
      <td class="py-2.5 px-3 font-bold text-white/80">${h.game}</td>
      <td class="py-2.5 px-3 text-right font-mono text-zinc-400">${h.bet}</td>
      <td class="py-2.5 px-3 text-right font-bold" style="color:${color}">${h.profit>0?'WIN':'LOSE'}</td>
      <td class="py-2.5 px-3 text-right font-mono font-bold" style="color:${color}">${h.profit>0?'+':''}${h.profit.toFixed(0)}</td>
      <td class="py-2.5 px-3 text-right text-zinc-600">${d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})} ${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</td>
    </tr>`;
  }).join('');
}

function clearHistory() {
  if (!confirm('Effacer tout l\'historique ?')) return;
  historyData=[];
  saveHistory();
  renderAll();
}

function renderAll() { renderStats(); renderChart('all'); renderTable(); }

window.addEventListener('DOMContentLoaded', ()=>{
  loadHistory();

  // Try rendering once stats are loaded from Firebase
  function tryRenderHist(attempts) {
    const globalStats = (typeof stats !== 'undefined') ? stats : null;
    const ready = globalStats && (globalStats.rounds > 0 || typeof refreshUserData !== 'undefined');
    if (ready || attempts >= 15) {
      renderAll();
    } else {
      setTimeout(()=>tryRenderHist(attempts+1), 500);
    }
  }
  tryRenderHist(0);

  // Also re-render when stats update
  let lastR = -1;
  setInterval(()=>{
    const s = typeof stats !== 'undefined' ? stats : {};
    if (Number(s.rounds) !== lastR) {
      lastR = Number(s.rounds);
      loadHistory();
      renderStats();
      if (historyData.length > 0) { renderChart('all'); renderTable(); }
    }
  }, 1500);
});
</script>
