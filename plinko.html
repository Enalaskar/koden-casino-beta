<script>
// ===== PLINKO ENGINE =====
const canvas = document.getElementById('plinko');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Multipliers per risk level
const MULTS = {
  low:  [5.6, 2.1, 1.1, 1.0, 0.5, 1.0, 1.1, 2.1, 5.6],
  mid:  [13,  3,   1.3, 0.7, 0.4, 0.7, 1.3, 3,   13],
  high: [29,  4,   1.5, 0.3, 0.2, 0.3, 1.5, 4,   29],
};
const MULT_COLORS = {
  low:  ['#fbbf24','#a78bfa','#22c55e','#60a5fa','#6b7280','#60a5fa','#22c55e','#a78bfa','#fbbf24'],
  mid:  ['#fbbf24','#f97316','#22c55e','#60a5fa','#6b7280','#60a5fa','#22c55e','#f97316','#fbbf24'],
  high: ['#ef4444','#f97316','#22c55e','#6b7280','#374151','#6b7280','#22c55e','#f97316','#ef4444'],
};

const ROWS = 12;
const COLS = ROWS + 1; // 13 pegs per bottom row
const PAD_X = 60, PAD_Y = 48;
const STEP_X = (W - PAD_X*2) / (COLS - 1);
const STEP_Y = (H - PAD_Y*2 - 80) / (ROWS);

let currentRisk = 'mid';
let balls = [];
let pkBalls=0, pkWins=0, pkBest=0;

function setRisk(r) {
  currentRisk = r;
  document.querySelectorAll('.risk-btn').forEach(b => b.style.opacity='0.5');
  document.getElementById('risk-'+r).style.opacity='1';
  renderMultDisplay();
}

function renderMultDisplay() {
  const el = document.getElementById('mult-display');
  const mults = MULTS[currentRisk];
  const colors = MULT_COLORS[currentRisk];
  el.innerHTML = mults.map((m,i) => 
    `<span style="background:${colors[i]}22;color:${colors[i]};border:1px solid ${colors[i]}44;padding:2px 7px;border-radius:6px;">x${m}</span>`
  ).join('');
}
renderMultDisplay();

// Peg positions
function pegPos(row, col) {
  const offset = row % 2 === 0 ? 0 : STEP_X / 2;
  const totalPegs = row % 2 === 0 ? COLS : COLS - 1;
  const startX = PAD_X + offset;
  return {
    x: startX + col * STEP_X,
    y: PAD_Y + row * STEP_Y
  };
}

function drawBoard() {
  ctx.clearRect(0, 0, W, H);

  // Pegs
  for (let row = 0; row < ROWS; row++) {
    const pegsInRow = row % 2 === 0 ? COLS : COLS - 1;
    for (let col = 0; col < pegsInRow; col++) {
      const {x, y} = pegPos(row, col);
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(139,92,246,0.6)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(167,139,250,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }

  // Bucket slots
  const bucketY = PAD_Y + ROWS * STEP_Y + 12;
  const mults = MULTS[currentRisk];
  const colors = MULT_COLORS[currentRisk];
  const bucketW = STEP_X - 4;
  mults.forEach((m, i) => {
    const bx = PAD_X + i * STEP_X - bucketW/2;
    ctx.fillStyle = colors[i] + '22';
    ctx.strokeStyle = colors[i] + '88';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(bx, bucketY, bucketW, 36, 6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = colors[i];
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('x' + m, PAD_X + i * STEP_X, bucketY + 22);
  });

  // Balls
  balls.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 8, 0, Math.PI*2);
    const grad = ctx.createRadialGradient(b.x-2, b.y-2, 1, b.x, b.y, 8);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(1, b.color || '#a78bfa');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });
}

function spawnBall(bet, userId) {
  // Start near the top center with small random offset
  const startX = W/2 + (Math.random()-0.5)*STEP_X*0.5;
  const b = {
    x: startX, y: PAD_Y - 20,
    vx: (Math.random()-0.5)*0.5,
    vy: 0,
    bet, userId,
    color: '#a78bfa',
    done: false,
    currentRow: -1,
  };
  balls.push(b);
}

function updateBalls() {
  const bucketY = PAD_Y + ROWS * STEP_Y + 12;
  const gravity = 0.22;
  const BALL_R  = 8;
  const PEG_R   = 5;

  balls.forEach(b => {
    if (b.done) return;
    b.vy += gravity;
    b.x  += b.vx;
    b.y  += b.vy;

    // Peg collisions
    for (let row = 0; row < ROWS; row++) {
      const pegsInRow = row % 2 === 0 ? COLS : COLS - 1;
      for (let col = 0; col < pegsInRow; col++) {
        const p = pegPos(row, col);
        const dx = b.x - p.x, dy = b.y - p.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < BALL_R + PEG_R + 1) {
          // Bounce: reflect velocity + random nudge
          const nx = dx/dist, ny = dy/dist;
          const speed = Math.sqrt(b.vx*b.vx+b.vy*b.vy);
          b.vx = nx * speed * 0.6 + (Math.random()-0.5)*1.2;
          b.vy = Math.abs(ny * speed * 0.6) + 1;
          // Separate
          b.x = p.x + nx*(BALL_R+PEG_R+1);
          b.y = p.y + ny*(BALL_R+PEG_R+1);
        }
      }
    }

    // Wall bounces
    if (b.x < BALL_R) { b.x = BALL_R; b.vx = Math.abs(b.vx); }
    if (b.x > W-BALL_R) { b.x = W-BALL_R; b.vx = -Math.abs(b.vx); }

    // Landed in bucket
    if (b.y >= bucketY + 10) {
      b.done = true;
      // Which slot?
      const mults = MULTS[currentRisk];
      const slotIdx = Math.max(0, Math.min(mults.length-1,
        Math.floor((b.x - PAD_X + STEP_X/2) / STEP_X)
      ));
      const mult = mults[slotIdx];
      const win  = Math.floor(b.bet * mult);
      finalizeBall(b, mult, win, slotIdx);
    }
  });

  balls = balls.filter(b => !b.done || b._keepFrames-- > 0);
}

async function finalizeBall(b, mult, win, slotIdx) {
  pkBalls++;
  document.getElementById('pk-balls').textContent = pkBalls;

  const profit = win - b.bet;
  const isWin  = mult >= 1;

  if (win > 0) {
    try {
      await window.fs.updateDoc(window.fs.doc(window.db_online,"users",b.userId),{balance:window.fs.increment(win)});
    } catch(e){}
    balance += win;
    if(typeof updateBalanceDisplay==="function") updateBalanceDisplay(balance);
  }
  if(typeof updateGlobalStats==="function") updateGlobalStats(profit, isWin, true);
  if(typeof addToLogs==="function") {
    const c = profit>=0?"#22c55e":"#ef4444";
    addToLogs(`BALLE: x${mult} → ${profit>=0?'+':''}${profit} coins`, c);
  }

  if (mult >= 5) {
    pkWins++;
    if (mult > pkBest) { pkBest=mult; document.getElementById('pk-best').textContent='x'+mult; }
    document.getElementById('pk-wins').textContent = pkWins;
    if(typeof showNotification==="function") showNotification(`x${mult} ! +${win} coins !`,"success");
  }

  // Flash result
  const res = document.getElementById('plinko-result');
  res.textContent = profit>=0 ? `+${win} coins (x${mult})` : `-${b.bet} coins`;
  res.style.color  = profit>=0 ? '#22c55e' : '#ef4444';
  res.style.opacity='1';
  setTimeout(()=>res.style.opacity='0', 1500);

  if(balance<=0 && typeof showNotification==="function") showNotification("Solde epuise !","error");
}

async function dropBall() {
  const userId = localStorage.getItem('active_session');
  if (!userId) return;
  const bet = parseInt(document.getElementById('plinko-bet').value);
  if (isNaN(bet)||bet<1) return;
  if (bet > balance) { if(typeof showNotification==="function") showNotification("Solde insuffisant !","error"); return; }

  // Deduct
  try {
    await window.fs.updateDoc(window.fs.doc(window.db_online,"users",userId),{balance:window.fs.increment(-bet)});
  } catch(e){}
  balance -= bet;
  if(typeof updateBalanceDisplay==="function") updateBalanceDisplay(balance);
  if(typeof updateGlobalStats==="function") updateGlobalStats(-bet,false,false);

  spawnBall(bet, userId);
}

// Game loop
function loop() {
  updateBalls();
  drawBoard();
  requestAnimationFrame(loop);
}
loop();
</script>
