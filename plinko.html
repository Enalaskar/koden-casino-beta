<script>
// ===== PLINKO ENGINE — v2.0 =====
// 16 rangées, 17 buckets, distribution binomiale correcte
// House edge: Low 3.5%, Mid 1%, High 3%

const canvas = document.getElementById('plinko');
const ctx    = canvas.getContext('2d');

// Dimensions
const W = 600, H = 680;
canvas.width  = W;
canvas.height = H;

const ROWS     = 16;
const SLOTS    = ROWS + 1;   // 17 buckets
const PAD_X    = 18;         // left/right padding
const PAD_Y    = 38;         // top padding
const STEP_X   = 32;         // bucket width (16 * 32 = 512, + 2*18 = 548 ≤ 580)
const STEP_Y   = 35;         // row spacing
const BUCKET_H = 54;         // bucket zone height
const PEG_R    = 4.5;        // peg radius
const BALL_R   = 7;          // ball radius
const CENTER_X = PAD_X + 8 * STEP_X + STEP_X / 2; // = 290

// ── MULTIPLIERS (EV calibré) ──────────────────────────────────────────
const MULTS = {
  low:  [16,   9,    2,   1.4,  1.2,  1.1,  1.0,  0.9,  0.8,  0.9,  1.0,  1.1,  1.2,  1.4,   2,   9,  16],
  mid:  [110,  41,  10,   5,    3,    1.5,  1.0,  0.5,  0.3,  0.5,  1.0,  1.5,   3,   5,   10,  41, 110],
  high: [1000, 130,  26,   9,    4,    2,    0.2,  0.2,  0.1,  0.2,  0.2,   2,    4,   9,   26, 130,1000],
};

const BUCKET_COLORS = {
  low:  ['#ef4444','#f97316','#fbbf24','#22c55e','#60a5fa','#6b7280','#4b5563','#374151','#374151','#374151','#4b5563','#6b7280','#60a5fa','#22c55e','#fbbf24','#f97316','#ef4444'],
  mid:  ['#ef4444','#ef4444','#f97316','#fbbf24','#fbbf24','#22c55e','#4b5563','#374151','#1f2937','#374151','#4b5563','#22c55e','#fbbf24','#fbbf24','#f97316','#ef4444','#ef4444'],
  high: ['#ef4444','#ef4444','#ef4444','#f97316','#fbbf24','#22c55e','#374151','#1f2937','#111827','#1f2937','#374151','#22c55e','#fbbf24','#f97316','#ef4444','#ef4444','#ef4444'],
};

let currentRisk = 'mid';
let balls        = [];
let flashBuckets = {};  // {slotIdx: alpha}
let pkBalls = 0, pkWins = 0, pkBest = 0;
let historyResults = []; // [{mult, profit}]

// ── RISK SELECTOR ────────────────────────────────────────────────────
function setRisk(r) {
  currentRisk = r;
  document.querySelectorAll('.risk-btn').forEach(b => {
    b.classList.remove('active-risk');
    b.style.opacity = '0.55';
  });
  const btn = document.getElementById('risk-' + r);
  btn.style.opacity = '1';
  btn.classList.add('active-risk');
  renderMultDisplay();
  buildBg();
}

function renderMultDisplay() {
  const el = document.getElementById('mult-display');
  const mults  = MULTS[currentRisk];
  const colors = BUCKET_COLORS[currentRisk];
  el.innerHTML = mults.map((m, i) =>
    `<span style="background:${colors[i]}28;color:${colors[i]};border:1px solid ${colors[i]}55;
      padding:2px 6px;border-radius:5px;font-size:9px;">${m}x</span>`
  ).join('');
}
renderMultDisplay();

// ── PEG POSITIONS ────────────────────────────────────────────────────
function pegPos(row, col) {
  // Even rows: pegs at x = PAD_X + col*STEP_X (col 0..ROWS)
  // Odd rows:  pegs at x = PAD_X + STEP_X/2 + col*STEP_X (col 0..ROWS-1)
  const isEven = row % 2 === 0;
  const x = isEven
    ? PAD_X + col * STEP_X
    : PAD_X + STEP_X / 2 + col * STEP_X;
  const y = PAD_Y + row * STEP_Y;
  return { x, y };
}

// ── WAYPOINT PATH SIMULATION ──────────────────────────────────────────
// Exact binomial distribution: at each row, ball goes left or right randomly.
// Waypoints trace the actual peg-to-peg path.
function buildBallPath() {
  const decisions = [];
  for (let i = 0; i < ROWS; i++) decisions.push(Math.random() < 0.5);
  const bucket = decisions.filter(Boolean).length; // 0..ROWS

  const waypoints = [];

  // Start above center
  waypoints.push({ x: CENTER_X + (Math.random() - 0.5) * 6, y: PAD_Y - 18 });

  // At each row, ball hits the peg at its current column
  let x = CENTER_X;
  for (let row = 0; row < ROWS; row++) {
    const isEven = row % 2 === 0;
    // Snap x to the nearest peg in this row
    const pegX = isEven
      ? Math.round((x - PAD_X) / STEP_X) * STEP_X + PAD_X
      : Math.round((x - PAD_X - STEP_X / 2) / STEP_X) * STEP_X + PAD_X + STEP_X / 2;
    const pegY = PAD_Y + row * STEP_Y;

    // Small random jitter at peg for natural look
    waypoints.push({
      x: pegX + (Math.random() - 0.5) * 3,
      y: pegY,
    });

    // Apply direction
    x += decisions[row] ? STEP_X / 2 : -STEP_X / 2;
  }

  // Land in bucket center
  const bucketCenterX = PAD_X + bucket * STEP_X + STEP_X / 2;
  const bucketY = PAD_Y + ROWS * STEP_Y + BUCKET_H / 2 - 2;
  waypoints.push({ x: bucketCenterX, y: bucketY });

  return { waypoints, bucket, decisions };
}

// ── PARTICLES ────────────────────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5,
      life: 1.0,
      decay: 0.045 + Math.random() * 0.03,
      r: 2 + Math.random() * 3,
      color,
    });
  }
}
function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12; // gravity
    p.life -= p.decay;
    p.r *= 0.97;
  });
}

// ── BACKGROUND (drawn once to offscreen canvas) ───────────────────────
let bgCanvas = null;
function buildBg() {
  bgCanvas = document.createElement('canvas');
  bgCanvas.width = W; bgCanvas.height = H;
  const bctx = bgCanvas.getContext('2d');

  // Fond uni très sombre
  bctx.fillStyle = '#07070f';
  bctx.fillRect(0, 0, W, H);

  // Glow central doux
  const cg = bctx.createRadialGradient(W/2, H*0.38, 0, W/2, H*0.38, W*0.5);
  cg.addColorStop(0,   'rgba(90,50,180,0.09)');
  cg.addColorStop(1,   'transparent');
  bctx.fillStyle = cg;
  bctx.fillRect(0, 0, W, H);

  // Grille propre : lignes horizontales et verticales fines
  bctx.strokeStyle = 'rgba(255,255,255,0.04)';
  bctx.lineWidth = 0.5;
  // Horizontales — espacées comme les rangées de pegs
  for (let row = 0; row < ROWS + 1; row++) {
    const ly = PAD_Y + row * STEP_Y - STEP_Y / 2;
    bctx.beginPath();
    bctx.moveTo(PAD_X, ly);
    bctx.lineTo(W - PAD_X, ly);
    bctx.stroke();
  }
  // Verticales — une par colonne de bucket
  for (let i = 0; i <= SLOTS; i++) {
    const lx = PAD_X + i * STEP_X;
    bctx.beginPath();
    bctx.moveTo(lx, PAD_Y - STEP_Y / 2);
    bctx.lineTo(lx, PAD_Y + ROWS * STEP_Y + STEP_Y / 2);
    bctx.stroke();
  }

  // Points d'intersection discrets
  bctx.fillStyle = 'rgba(255,255,255,0.07)';
  for (let row = 0; row < ROWS + 1; row++) {
    const ly = PAD_Y + row * STEP_Y - STEP_Y / 2;
    for (let i = 0; i <= SLOTS; i++) {
      const lx = PAD_X + i * STEP_X;
      bctx.beginPath();
      bctx.arc(lx, ly, 1, 0, Math.PI * 2);
      bctx.fill();
    }
  }
}
buildBg();

// ── PEG HIT FLASH ─────────────────────────────────────────────────────
let pegFlashes = {}; // "row-col": alpha

// ── DRAWING ───────────────────────────────────────────────────────────
function drawBoard() {
  // Draw cached background
  ctx.drawImage(bgCanvas, 0, 0);

  const bucketTopY = PAD_Y + ROWS * STEP_Y + 10;
  const mults  = MULTS[currentRisk];
  const colors = BUCKET_COLORS[currentRisk];

  // ── BUCKETS ──────────────────────────────────────────────────────
  for (let i = 0; i < SLOTS; i++) {
    const bx    = PAD_X + i * STEP_X;
    const col   = colors[i];
    const flash = flashBuckets[i] || 0;
    const bw    = STEP_X - 3;
    const bh    = BUCKET_H - 2;
    const br    = 9;

    // Glow behind bucket on flash
    if (flash > 0.05) {
      ctx.shadowColor = col;
      ctx.shadowBlur  = 18 * flash;
    }

    // Bucket body gradient
    const bg = ctx.createLinearGradient(bx, bucketTopY, bx, bucketTopY + bh);
    const alpha = Math.floor((0.12 + flash * 0.45) * 255).toString(16).padStart(2,'0');
    bg.addColorStop(0,   col + Math.floor((0.25 + flash * 0.4)*255).toString(16).padStart(2,'0'));
    bg.addColorStop(1,   col + alpha);
    ctx.fillStyle = bg;
    roundRect(ctx, bx + 1.5, bucketTopY, bw, bh, br);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Border
    ctx.strokeStyle = flash > 0.1
      ? col + Math.floor(flash * 220).toString(16).padStart(2,'0')
      : col + '44';
    ctx.lineWidth = flash > 0.1 ? 1.5 : 0.8;
    roundRect(ctx, bx + 1.5, bucketTopY, bw, bh, br);
    ctx.stroke();

    // Top accent line
    if (flash > 0.05) {
      ctx.strokeStyle = col + 'dd';
      ctx.lineWidth   = 2;
      ctx.beginPath();
      ctx.moveTo(bx + 1.5 + br, bucketTopY);
      ctx.lineTo(bx + 1.5 + bw - br, bucketTopY);
      ctx.stroke();
    }

    // Multiplier text — size adapts
    const fontSize = mults[i] >= 1000 ? 7 : mults[i] >= 100 ? 8 : mults[i] >= 10 ? 9.5 : 11;
    ctx.fillStyle    = flash > 0.1 ? '#ffffff' : col + 'ee';
    ctx.font         = `900 ${fontSize}px "Space Grotesk", monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    // Shadow for readability
    ctx.shadowColor  = flash > 0.1 ? col : 'transparent';
    ctx.shadowBlur   = flash > 0.1 ? 8 : 0;
    ctx.fillText(mults[i] + 'x', bx + STEP_X / 2, bucketTopY + bh / 2);
    ctx.shadowBlur = 0;

    // Flash decay
    if (flash > 0) {
      flashBuckets[i] = flash * 0.86;
      if (flashBuckets[i] < 0.01) delete flashBuckets[i];
    }
  }

  // ── PEGS ──────────────────────────────────────────────────────────
  for (let row = 0; row < ROWS; row++) {
    const isEven   = row % 2 === 0;
    const pegCount = isEven ? ROWS + 1 : ROWS;

    for (let col = 0; col < pegCount; col++) {
      const { x, y } = pegPos(row, col);
      const key       = row + '-' + col;
      const pegFlash  = pegFlashes[key] || 0;

      // Proximity glow
      let nearestDist = Infinity;
      balls.forEach(b => {
        const d = Math.hypot(b.x - x, b.y - y);
        if (d < nearestDist) nearestDist = d;
      });
      const prox = Math.max(0, 1 - nearestDist / 55);

      const totalGlow = Math.max(prox, pegFlash);

      // Outer glow ring
      if (totalGlow > 0.05) {
        const rg = ctx.createRadialGradient(x, y, PEG_R, x, y, PEG_R + 8 * totalGlow);
        rg.addColorStop(0,   `rgba(167,139,250,${0.35 * totalGlow})`);
        rg.addColorStop(1,   'transparent');
        ctx.fillStyle = rg;
        ctx.beginPath();
        ctx.arc(x, y, PEG_R + 8 * totalGlow, 0, Math.PI * 2);
        ctx.fill();
      }

      // Peg body gradient
      const pg = ctx.createRadialGradient(x - 1.2, y - 1.5, 0.5, x, y, PEG_R);
      if (totalGlow > 0.1) {
        pg.addColorStop(0,   '#ffffff');
        pg.addColorStop(0.4, `rgba(220,200,255,${0.9})`);
        pg.addColorStop(1,   `rgba(139,92,246,${0.95})`);
      } else {
        pg.addColorStop(0,   'rgba(255,255,255,0.9)');
        pg.addColorStop(0.3, 'rgba(180,160,240,0.75)');
        pg.addColorStop(1,   'rgba(80,50,160,0.6)');
      }
      ctx.beginPath();
      ctx.arc(x, y, PEG_R, 0, Math.PI * 2);
      ctx.fillStyle = pg;
      ctx.fill();

      // Highlight dot
      ctx.beginPath();
      ctx.arc(x - 1.2, y - 1.5, 1.2, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${0.5 + totalGlow * 0.4})`;
      ctx.fill();

      // Flash decay
      if (pegFlash > 0) {
        pegFlashes[key] = pegFlash * 0.82;
        if (pegFlashes[key] < 0.01) delete pegFlashes[key];
      }
    }
  }

  // ── PARTICLES ──────────────────────────────────────────────────────
  updateParticles();
  particles.forEach(p => {
    ctx.globalAlpha = p.life * 0.85;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ── BALLS ──────────────────────────────────────────────────────────
  balls.forEach(b => {
    if (!b.trail) return;

    // Glow trail
    b.trail.forEach((t, i) => {
      const frac = i / b.trail.length;
      const a    = frac * 0.4;
      const r    = BALL_R * (0.3 + frac * 0.7);
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#a78bfa';
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Outer glow
    const og = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, BALL_R + 7);
    og.addColorStop(0,   'rgba(167,139,250,0.5)');
    og.addColorStop(1,   'transparent');
    ctx.fillStyle = og;
    ctx.beginPath();
    ctx.arc(b.x, b.y, BALL_R + 7, 0, Math.PI * 2);
    ctx.fill();

    // Ball body
    const grad = ctx.createRadialGradient(b.x - 2, b.y - 2.5, 1, b.x, b.y, BALL_R);
    grad.addColorStop(0,    '#ffffff');
    grad.addColorStop(0.25, '#e8d5ff');
    grad.addColorStop(0.65, '#a78bfa');
    grad.addColorStop(1,    '#6d28d9');
    ctx.beginPath();
    ctx.arc(b.x, b.y, BALL_R, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Specular highlight
    ctx.beginPath();
    ctx.arc(b.x - 2, b.y - 2.5, 2.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.fill();
  });
}

// Helper: rounded rect path
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x,     y + h, x,     y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x,     y,     x + r, y);
  ctx.closePath();
}

// ── BALL UPDATE ───────────────────────────────────────────────────────
function updateBalls() {
  balls.forEach(b => {
    if (b.done) return;

    // Store trail
    if (!b.trail) b.trail = [];
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 7) b.trail.shift();

    // Move toward next waypoint using smoothstep
    const wp   = b.waypoints;
    const next = wp[b.wpIdx + 1];
    if (!next) { b.done = true; return; }

    // Speed increases with row (gravity feel)
    const rowProgress = b.wpIdx / ROWS;
    const speed = 0.045 + rowProgress * 0.055 + Math.random() * 0.012;
    b.t += speed;

    if (b.t >= 1) {
      b.t -= 1;
      // Flash the peg we just hit
      if (b.wpIdx > 0 && b.wpIdx <= ROWS) {
        const row = b.wpIdx - 1;
        const isEven = row % 2 === 0;
        const px = wp[b.wpIdx].x;
        const py = PAD_Y + row * STEP_Y;
        // Find nearest peg col
        const col = isEven
          ? Math.round((px - PAD_X) / STEP_X)
          : Math.round((px - PAD_X - STEP_X/2) / STEP_X);
        pegFlashes[row + '-' + col] = 1.0;
        // Tiny spark
        spawnParticles(px, py, '#a78bfa', 4);
      }
      b.wpIdx++;
      if (b.wpIdx >= wp.length - 1) {
        b.x = wp[wp.length - 1].x;
        b.y = wp[wp.length - 1].y;
        b.done = true;
        finalizeBall(b);
        return;
      }
    }

    // Smoothstep interpolation
    const t  = Math.max(0, Math.min(1, b.t));
    const s  = t * t * (3 - 2 * t);
    const from = wp[b.wpIdx];
    const to   = wp[b.wpIdx + 1];
    b.x = from.x + (to.x - from.x) * s;
    b.y = from.y + (to.y - from.y) * s;
  });

  balls = balls.filter(b => !b.done);
}

// ── FINALIZE ─────────────────────────────────────────────────────────
async function finalizeBall(b) {
  const mults = MULTS[currentRisk];
  const mult  = mults[b.bucket];
  const win   = Math.floor(b.bet * mult);
  const profit = win - b.bet;

  pkBalls++;
  document.getElementById('pk-balls').textContent = pkBalls;

  // Flash bucket + particles
  flashBuckets[b.bucket] = 1.2;
  const bucketCX = PAD_X + b.bucket * STEP_X + STEP_X / 2;
  const bucketCY = PAD_Y + ROWS * STEP_Y + BUCKET_H / 2;
  const pCol = BUCKET_COLORS[currentRisk][b.bucket];
  const pCount = mult >= 100 ? 28 : mult >= 10 ? 18 : mult >= 1 ? 10 : 6;
  spawnParticles(bucketCX, bucketCY, pCol, pCount);
  // Extra white sparks for big wins
  if (mult >= 10) spawnParticles(bucketCX, bucketCY - 10, '#ffffff', 8);

  // Credit winnings
  if (win > 0) {
    try {
      await window.fs.updateDoc(
        window.fs.doc(window.db_online, 'users', activeUser),
        { balance: window.fs.increment(win) }
      );
    } catch(e) {}
    balance += win;
    if (typeof updateBalanceDisplay === 'function') updateBalanceDisplay(balance);
  }

  // Stats (single call with net profit)
  if (typeof updateGlobalStats === 'function') updateGlobalStats(profit, profit > 0, true);
  if (typeof addToLogs === 'function') {
    const col = profit >= 0 ? '#22c55e' : '#ef4444';
    addToLogs(`BALLE: x${mult} → ${profit >= 0 ? '+' : ''}${profit} coins`, col);
  }

  // Track session wins (only count mult >= 1 as "win")
  if (mult >= 1) {
    pkWins++;
    document.getElementById('pk-wins').textContent = pkWins;
  }
  if (mult > pkBest) {
    pkBest = mult;
    document.getElementById('pk-best').textContent = 'x' + mult;
  }

  // History chips
  historyResults.unshift({ mult, profit });
  if (historyResults.length > 10) historyResults.pop();
  renderHistory();

  // Result flash
  const res = document.getElementById('plinko-result');
  res.textContent = profit >= 0 ? `+${win} coins (x${mult})` : `-${b.bet} coins (x${mult})`;
  res.style.color   = profit >= 0 ? '#22c55e' : '#ef4444';
  res.style.opacity = '1';
  setTimeout(() => { res.style.opacity = '0'; }, 2000);

  // Big win notification
  if (mult >= 10 && typeof showNotification === 'function') {
    showNotification(`x${mult} ! +${win} coins`, 'success');
  }
}

// ── HISTORY ──────────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('hist-row');
  if (!el) return;
  el.innerHTML = historyResults.map(h => {
    const col = h.mult >= 10 ? '#fbbf24' : h.profit > 0 ? '#22c55e' : '#ef4444';
    const label = h.mult >= 100 ? '!!!' : h.mult >= 10 ? '!!' : h.mult >= 1 ? '+' : '-';
    return `<div class="hist-chip" title="x${h.mult}" style="background:${col}22;color:${col};border:1px solid ${col}55;">${label}</div>`;
  }).join('');
}

// ── DROP BALL ─────────────────────────────────────────────────────────
async function dropBall() {
  if (!activeUser) return;
  const bet = parseInt(document.getElementById('plinko-bet').value);
  if (isNaN(bet) || bet < 1) return;
  if (bet > balance) {
    if (typeof showNotification === 'function') showNotification('Solde insuffisant !', 'error');
    return;
  }
  if (balls.length >= 8) {
    if (typeof showNotification === 'function') showNotification('Max 8 balles en vol !', 'error');
    return;
  }

  // Deduct immediately
  try {
    await window.fs.updateDoc(
      window.fs.doc(window.db_online, 'users', activeUser),
      { balance: window.fs.increment(-bet) }
    );
  } catch(e) {}
  balance -= bet;
  if (typeof updateBalanceDisplay === 'function') updateBalanceDisplay(balance);

  // Build path and spawn ball
  const { waypoints, bucket } = buildBallPath();
  balls.push({
    x: waypoints[0].x,
    y: waypoints[0].y,
    waypoints,
    bucket,
    wpIdx: 0,
    t: 0,
    trail: [],
    bet,
    done: false,
  });
}

// ── AUTO-BET ─────────────────────────────────────────────────────────
let autoBetInterval = null;
function toggleAutoBet() {
  const btn = document.getElementById('auto-btn');
  if (autoBetInterval) {
    clearInterval(autoBetInterval);
    autoBetInterval = null;
    btn.textContent = 'Auto';
    btn.classList.remove('bg-[#ef4444]/20','border-[#ef4444]/40','text-[#ef4444]');
    btn.classList.add('bg-[#0F0F12]','border-[#1f1f21]','text-zinc-400');
  } else {
    btn.textContent = 'Stop';
    btn.classList.add('bg-[#ef4444]/20','border-[#ef4444]/40','text-[#ef4444]');
    btn.classList.remove('bg-[#0F0F12]','border-[#1f1f21]','text-zinc-400');
    autoBetInterval = setInterval(() => {
      if (balance <= 0) { toggleAutoBet(); return; }
      dropBall();
    }, 420);
  }
}

// ── GAME LOOP ─────────────────────────────────────────────────────────
function loop() {
  updateBalls();
  drawBoard();
  // Update ball count
  const bcd = document.getElementById('ball-count-display');
  if (bcd) bcd.textContent = balls.length + ' balle' + (balls.length !== 1 ? 's' : '') + ' en vol';
  requestAnimationFrame(loop);
}
loop();
</script>
