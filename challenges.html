<script>
// ===== CHALLENGES SYSTEM =====

const DAILY_CHALLENGES = [
  { id:'d_play5',    title:'Joueur assidu',      desc:'Jouer 5 parties',                  icon:'&#x1F3AE;', target:5,   key:'rounds',     reward:8  },
  { id:'d_win3',     title:'Serie gagnante',     desc:'Remporter 3 parties',              icon:'&#x2705;',  target:3,   key:'wins',       reward:12 },
  { id:'d_profit20', title:'Dans le vert',       desc:'Gagner 20 coins en net',           icon:'&#x1F4B0;', target:20,  key:'profit',     reward:15 },
  { id:'d_play10',   title:'Marathon',           desc:'Jouer 10 parties en une journee',  icon:'&#x1F525;', target:10,  key:'rounds',     reward:20 },
];
const WEEKLY_CHALLENGES = [
  { id:'w_play50',   title:'Habitue',            desc:'Jouer 50 parties cette semaine',   icon:'&#x1F3C6;', target:50,  key:'rounds',     reward:50  },
  { id:'w_win20',    title:'Champion de la semaine', desc:'Gagner 20 parties',            icon:'&#x1F451;', target:20,  key:'wins',       reward:75  },
  { id:'w_profit100',title:'Rentable',           desc:'Gagner 100 coins en net',          icon:'&#x1F4C8;', target:100, key:'profit',     reward:100 },
  { id:'w_play_all', title:'Explorateur',        desc:'Jouer sur 5 jeux differents',      icon:'&#x1F5FA;', target:5,   key:'games',      reward:60  },
];

let chData = {};     // {id: {progress, claimed}}
let totalEarned = 0;

function todayKey() { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }
function weekKey()  { const d=new Date(); return `${d.getFullYear()}-W${Math.floor(d.getDate()/7)}-${d.getMonth()}`; }

function loadChData() {
  const raw = localStorage.getItem('koden_challenges');
  if (!raw) return;
  const parsed = JSON.parse(raw);
  // Reset daily if day changed
  if (parsed.dayKey !== todayKey()) {
    DAILY_CHALLENGES.forEach(c => { delete parsed[c.id]; });
    parsed.dayKey = todayKey();
  }
  if (parsed.weekKey !== weekKey()) {
    WEEKLY_CHALLENGES.forEach(c => { delete parsed[c.id]; });
    parsed.weekKey = weekKey();
  }
  chData = parsed;
}

function saveChData() {
  chData.dayKey  = todayKey();
  chData.weekKey = weekKey();
  localStorage.setItem('koden_challenges', JSON.stringify(chData));
}

function getProgress(challenge) {
  // stats is the global from script.js (loaded from Firebase)
  const s = (typeof stats !== 'undefined') ? stats : {};
  const rounds = Number(s.rounds) || 0;
  const wins   = Number(s.wins)   || 0;
  const profit = Number(s.totalProfit) || 0;
  if (challenge.key === 'rounds') return Math.min(rounds, challenge.target);
  if (challenge.key === 'wins')   return Math.min(wins,   challenge.target);
  if (challenge.key === 'profit') return Math.min(Math.max(profit, 0), challenge.target);
  if (challenge.key === 'games') {
    // Count unique game types from local history
    const user = localStorage.getItem('active_session');
    try {
      const hist = JSON.parse(localStorage.getItem('koden_history_'+user)||'[]');
      const uniq = new Set(hist.map(h=>h.game)).size;
      return Math.min(uniq, challenge.target);
    } catch(e) { return 0; }
  }
  return 0;
}

function renderChallenge(c, container) {
  const progress  = getProgress(c);
  const pct       = Math.min(100, Math.round((progress / c.target)*100));
  const isDone    = progress >= c.target;
  const isClaimed = chData[c.id]?.claimed;

  const card = document.createElement('div');
  card.className = 'challenge-card' + (isDone&&!isClaimed?' done':'') + (isClaimed?' claimed':'');
  card.innerHTML = `
    <div class="flex items-start justify-between mb-3">
      <div class="flex items-center gap-3">
        <span class="text-2xl">${c.icon}</span>
        <div>
          <p class="text-sm font-black italic uppercase tracking-tight leading-none">${c.title}</p>
          <p class="text-[9px] text-zinc-500 font-bold mt-0.5">${c.desc}</p>
        </div>
      </div>
      <div class="shrink-0 flex items-center gap-1.5 bg-[#fbbf24]/10 border border-[#fbbf24]/20 px-2.5 py-1 rounded-lg">
        <img src="coin.png" class="w-3 h-3">
        <span class="text-[10px] font-black text-[#fbbf24]">+${c.reward}</span>
      </div>
    </div>
    <div class="progress-bar mb-2">
      <div class="progress-fill ${isDone?'done':''}" style="width:${pct}%"></div>
    </div>
    <div class="flex items-center justify-between">
      <span class="text-[9px] text-zinc-600 font-bold">${progress} / ${c.target}</span>
      ${isDone && !isClaimed
        ? `<button onclick="claimChallenge('${c.id}',${c.reward})" class="bg-[#22c55e] text-black font-black text-[9px] px-3 py-1.5 rounded-lg uppercase italic hover:brightness-110 active:scale-95 transition-all">Reclamer</button>`
        : isClaimed
        ? `<span class="text-[9px] text-[#22c55e] font-black italic">Reclame</span>`
        : `<span class="text-[9px] text-zinc-700 font-bold">${pct}%</span>`
      }
    </div>`;
  container.appendChild(card);
}

function renderAll() {
  const dc = document.getElementById('daily-challenges');
  const wc = document.getElementById('weekly-challenges');
  dc.innerHTML=''; wc.innerHTML='';
  let done=0;
  [...DAILY_CHALLENGES,...WEEKLY_CHALLENGES].forEach(c=>{
    if(getProgress(c)>=c.target||chData[c.id]?.claimed) done++;
  });
  document.getElementById('ch-completed').textContent=done;
  document.getElementById('ch-earned').textContent=totalEarned;
  DAILY_CHALLENGES.forEach(c=>renderChallenge(c,dc));
  WEEKLY_CHALLENGES.forEach(c=>renderChallenge(c,wc));
}

async function claimChallenge(id, reward) {
  if (!chData[id]) chData[id]={};
  if (chData[id].claimed) return;
  chData[id].claimed = true;
  saveChData();

  balance += reward;
  totalEarned += reward;
  if(typeof updateBalanceDisplay==="function") updateBalanceDisplay(balance);
  try {
    const u=localStorage.getItem('active_session');
    if(u) await window.fs.updateDoc(window.fs.doc(window.db_online,"users",u),{balance:window.fs.increment(reward)});
  } catch(e){}
  if(typeof showNotification==="function") showNotification(`+${reward} coins obtenus !`,"success");
  renderAll();
}

// Reset timer
function updateTimer() {
  const now=new Date(), midnight=new Date(now);
  midnight.setHours(24,0,0,0);
  const diff=midnight-now;
  const h=Math.floor(diff/3600000), m=Math.floor((diff%3600000)/60000), s=Math.floor((diff%60000)/1000);
  document.getElementById('reset-timer').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
setInterval(updateTimer,1000); updateTimer();

// Wait for Firebase stats to load, then render
// stats is a global from script.js set after refreshUserData()
function tryRender() {
  if (typeof stats !== 'undefined' && typeof balance !== 'undefined' && (stats.rounds > 0 || typeof refreshUserData !== 'undefined')) {
    loadChData();
    renderAll();
    return;
  }
  setTimeout(tryRender, 400);
}

// Also re-render whenever balance changes (proxy for stats update)
let lastKnownRounds = -1;
setInterval(()=>{
  if(typeof stats!=='undefined' && stats.rounds !== lastKnownRounds) {
    lastKnownRounds = stats.rounds;
    renderAll();
  }
}, 1000);

window.addEventListener('DOMContentLoaded', ()=>setTimeout(tryRender, 1000));
</script>
